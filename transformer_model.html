26, 01:19:33 PM", "publicid": "2026p471775"}, {"lat": -39.772785187, "lon": 174.063171387, "magnitude": 3.126339579691993, "depth": 123.53607177734375, "intensity": "Low", "timestamp": "Wed, Jun 24 2026, 12:35:22 PM", "publicid": "2026p471687"}];

        // Add markers for each earthquake

            var size = Math.max(5, quake.magnitude * 2);

            var marker = L.circleMarker([quake.lat, quake.lon], {
                radius: size,
                fillColor: color,
                color: color,
                weight: 2,
                opacity: 0.8,
                fillOpacity: 0.6

            // Create popup with earthquake details
            var popupContent = `
                <div style="font-family: Arial, sans-serif;">
                    <h3 style="margin: 0 0 10px 0; color: #6b46c1;">
                        Magnitude ${quake.magnitude}
                    </h3>
                    <p style="margin: 5px 0;"><strong>Intensity:</strong>

                    <p style="margin: 5px 0;">

                    </p>
                    <p style="margin: 5px 0;">

            marker.bindPopup(popupContent);
