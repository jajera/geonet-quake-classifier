                        Magnitude ${quake.magnitude}
                    </h3>
                    <p style="margin: 5px 0;"><strong>Intensity:</strong>
                        <span style="color: ${color}; font-weight: bold;">
                            ${quake.intensity}
                        </span>
                    </p>
                    <p style="margin: 5px 0;">
                        <strong>Depth:</strong> ${quake.depth} km
                    </p>
                    <p style="margin: 5px 0;">
                        <strong>Time:</strong> ${quake.timestamp}
                    </p>
                    <p style="margin: 5px 0;"><strong>Location:</strong>
                        ${quake.lat.toFixed(4)}, ${quake.lon.toFixed(4)}
                    </p>
                    <p style="margin: 10px 0 0 0;">
            <a href="${"https://www.geonet.org.nz/earthquake/"}${quake.publicid}"
                           target="_blank"
                           style="color: #3498db; text-decoration: none;">
                            View on GeoNet →
                        </a>
                    </p>
                </div>
            `;

            marker.bindPopup(popupContent);
        });

        // Add legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function(map) {
            var div = L.DomUtil.create('div', 'legend');
            div.style.backgroundColor = 'white';
            div.style.padding = '10px';
            div.style.border = '2px solid #ccc';
            div.style.borderRadius = '5px';
            div.innerHTML = `
                <h4 style="margin: 0 0 10px 0;">
                    Intensity (predicted)
                </h4>
                <div style="margin: 5px 0;">
                    <span
                        style="
                            display: inline-block;
                            width: 12px;
                            height: 12px;
                            background-color: red;
                            border-radius: 50%;
                            margin-right: 8px;"
                    ></span>
                    High (Mag >= 4)
                </div>
                <div style="margin: 5px 0;">
                    <span style="
                        display: inline-block;
                        width: 12px;
                        height: 12px;
                        background-color: green;
                        border-radius: 50%;
                        margin-right: 8px;"
                    ></span>
                    Low (Mag < 4)
                </div>
            `;
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
